<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quran Verse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --primary-color: #2E7D32;
            --secondary-color: #4CAF50;
            --accent-color: #81C784;
            --gold-color: #FFD700;
            --bg-gradient: linear-gradient(135deg, #1B5E20, #2E7D32, #388E3C);
            --text-light: #F1F8E9;
            --text-dark: #1B5E20;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
        }
        
        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 25% 25%, var(--gold-color) 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, var(--accent-color) 1px, transparent 1px);
            background-size: 60px 60px, 40px 40px;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }
        
        .app-title {
            font-size: 3rem;
            font-weight: 700;
            color: var(--gold-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            position: relative;
        }
        
        .app-title::before,
        .app-title::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--accent-color);
        }
        
        .app-title::before { left: -50px; }
        .app-title::after { right: -50px; }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .date-display {
            background: var(--card-bg);
            color: var(--text-dark);
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin: 30px auto;
            font-weight: 600;
            box-shadow: var(--shadow);
            animation: fadeIn 1s ease-out 0.3s both;
        }
        
        .verse-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            animation: slideUp 1s ease-out 0.5s both;
            position: relative;
            overflow: hidden;
        }
        
        .verse-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }
        
        .verse-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .surah-info {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .verse-number {
            background: var(--gold-color);
            color: var(--text-dark);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: auto;
        }
        
        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            line-height: 2.2;
            text-align: right;
            direction: rtl;
            color: var(--text-dark);
            margin-bottom: 25px;
            padding: 25px;
            background: linear-gradient(45deg, rgba(129, 199, 132, 0.1), rgba(255, 215, 0, 0.1));
            border-radius: 15px;
            border-right: 4px solid var(--primary-color);
        }
        
        .translation {
            font-size: 1.3rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 15px;
            border-left: 4px solid var(--secondary-color);
            font-style: italic;
        }
        
        .explanation {
            color: var(--text-dark);
            line-height: 1.7;
            font-size: 1.1rem;
            padding: 25px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            border-bottom: 4px solid var(--accent-color);
        }
        
        .explanation h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .explanation h3::before {
            content: '📖';
            font-size: 1.2rem;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, var(--secondary-color), var(--accent-color));
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--gold-color), #FFA500);
            color: var(--text-dark);
        }
        
        .btn-primary:hover {
            background: linear-gradient(45deg, #FFA500, #FF8C00);
        }
        
        .loading {
            text-align: center;
            color: var(--text-light);
            font-size: 1.2rem;
            padding: 40px;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--gold-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        
        .error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #d32f2f;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .app-title { font-size: 2rem; }
            .app-title::before, .app-title::after { display: none; }
            .verse-card { padding: 25px; margin: 20px; }
            .arabic-text { font-size: 1.6rem; }
            .translation { font-size: 1.1rem; }
            .verse-header { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="app-title">Daily Quran</h1>
            <p class="subtitle">Discover wisdom through verses and their meanings</p>
            <div class="date-display" id="dateDisplay"></div>
        </div>
        
        <div id="verseContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading today's verse...</p>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="loadNewVerse()">
                🔄 New Verse
            </button>
            <button class="btn" onclick="shareVerse()">
                📤 Share
            </button>
            <button class="btn" onclick="toggleBookmark()">
                🔖 Bookmark
            </button>
        </div>
        
        <div class="footer">
            <p>May this verse bring peace and guidance to your day ✨</p>
        </div>
    </div>

    <script>
        let currentVerse = null;
        let bookmarks = JSON.parse(localStorage.getItem('quranBookmarks')) || [];
        
        // Display current date
        function updateDate() {
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            document.getElementById('dateDisplay').textContent = 
                new Date().toLocaleDateString('en-US', options);
        }
        
        // Get daily verse based on date (deterministic)
        function getDailyVerseNumber() {
            const today = new Date();
            const start = new Date(today.getFullYear(), 0, 0);
            const diff = today - start;
            const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            // There are 6236 verses in Quran, cycle through them
            return (dayOfYear % 6236) + 1;
        }
        
        // Load verse from API
        async function loadVerse(verseNumber = null) {
            const container = document.getElementById('verseContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading verse...</p>
                </div>
            `;
            
            try {
                // Use different verse number if provided, otherwise use daily
                const targetVerse = verseNumber || getDailyVerseNumber();
                
                // Using multiple APIs for better reliability
                let verseData = null;
                
                // Try API 1: AlQuran.cloud (reliable)
                try {
                    const response = await fetch(`https://api.alquran.cloud/v1/ayah/${targetVerse}/editions/quran-uthmani,en.sahih,en.pickthall`);
                    const data = await response.json();
                    
                    if (data.status === 'OK' && data.data.length >= 2) {
                        verseData = {
                            arabic: data.data[0].text,
                            translation: data.data[1].text,
                            surahName: data.data[0].surah.englishName,
                            surahNumber: data.data[0].surah.number,
                            ayahNumber: data.data[0].numberInSurah,
                            juz: data.data[0].juz,
                            verseNumber: targetVerse
                        };
                    }
                } catch (e) {
                    console.log('API 1 failed, trying backup...');
                }
                
                // If first API fails, try backup approach
                if (!verseData) {
                    // Generate a random verse from predefined collection
                    const verses = [
                        {
                            arabic: "وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ",
                            translation: "And whoever fears Allah - He will make for him a way out and provide for him from where he does not expect.",
                            surahName: "At-Talaq",
                            surahNumber: 65,
                            ayahNumber: 2,
                            explanation: "This verse emphasizes the importance of Taqwa (God-consciousness) in a believer's life. When someone truly fears Allah and lives according to His guidance, Allah promises to provide solutions to their problems and sustenance from unexpected sources. This teaches us that true reliance should be on Allah alone, and that He is the ultimate provider and problem-solver."
                        },
                        {
                            arabic: "وَلَا تَيْأَسُوا مِن رَّوْحِ اللَّهِ ۖ إِنَّهُ لَا يَيْأَسُ مِن رَّوْحِ اللَّهِ إِلَّا الْقَوْمُ الْكَافِرُونَ",
                            translation: "And do not despair of relief from Allah. Indeed, no one despairs of relief from Allah except the disbelieving people.",
                            surahName: "Yusuf",
                            surahNumber: 12,
                            ayahNumber: 87,
                            explanation: "This powerful verse reminds us never to lose hope in Allah's mercy and help. Even in the darkest times, a believer should maintain faith that Allah will provide relief and solution. Despair is contrary to faith, as it implies doubt in Allah's power and mercy. This verse teaches us that hope and optimism are fundamental aspects of Islamic faith."
                        },
                        {
                            arabic: "فَإِنَّ مَعَ الْعُسْرِ يُسْرًا إِنَّ مَعَ الْعُسْرِ يُسْرًا",
                            translation: "For indeed, with hardship [will be] ease. Indeed, with hardship [will be] ease.",
                            surahName: "Ash-Sharh",
                            surahNumber: 94,
                            ayahNumber: 5,
                            explanation: "This verse is repeated twice for emphasis, showing Allah's promise that ease will come with every difficulty. The Arabic grammar suggests that ease comes alongside hardship, not necessarily after it. This teaches us that even in our struggles, there are blessings and ease that we may not immediately recognize. It's a source of hope and comfort for believers facing challenges."
                        },
                        {
                            arabic: "وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ",
                            translation: "And whoever relies upon Allah - then He is sufficient for him.",
                            surahName: "At-Talaq",
                            surahNumber: 65,
                            ayahNumber: 3,
                            explanation: "This verse teaches the concept of Tawakkul (trust in Allah). When someone truly relies on Allah after taking proper measures, Allah becomes sufficient for all their needs. This doesn't mean being passive, but rather doing one's best and then trusting Allah with the outcome. It's about having complete confidence that Allah will take care of those who put their trust in Him."
                        },
                        {
                            arabic: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ",
                            translation: "Our Lord, give us in this world [that which is] good and in the Hereafter [that which is] good and protect us from the punishment of the Fire.",
                            surahName: "Al-Baqarah",
                            surahNumber: 2,
                            ayahNumber: 201,
                            explanation: "This is one of the most comprehensive and beautiful supplications in the Quran. It seeks Allah's blessings for both this world and the hereafter, showing the balanced approach Islam teaches - caring for worldly needs while not forgetting the afterlife. The prayer asks for goodness in general terms, allowing Allah to give what He knows is best for us."
                        }
                    ];
                    
                    const randomIndex = (targetVerse % verses.length);
                    verseData = verses[randomIndex];
                    verseData.verseNumber = targetVerse;
                }
                
                currentVerse = verseData;
                displayVerse(verseData);
                
            } catch (error) {
                console.error('Error loading verse:', error);
                container.innerHTML = `
                    <div class="error">
                        <h3>Unable to load verse</h3>
                        <p>Please check your internet connection and try again.</p>
                        <button class="btn" onclick="loadVerse()" style="margin-top: 15px;">
                            Try Again
                        </button>
                    </div>
                `;
            }
        }
        
        // Display verse in the UI
        function displayVerse(verse) {
            const container = document.getElementById('verseContainer');
            
            // Generate explanation if not provided
            if (!verse.explanation) {
                verse.explanation = generateExplanation(verse);
            }
            
            container.innerHTML = `
                <div class="verse-card">
                    <div class="verse-header">
                        <div class="surah-info">
                            📖 Surah ${verse.surahName} (${verse.surahNumber})
                        </div>
                        <div class="verse-number">Verse ${verse.ayahNumber}</div>
                    </div>
                    
                    <div class="arabic-text">${verse.arabic}</div>
                    
                    <div class="translation">"${verse.translation}"</div>
                    
                    <div class="explanation">
                        <h3>Reflection & Guidance</h3>
                        <p>${verse.explanation}</p>
                    </div>
                </div>
            `;
        }
        
        // Generate explanation for verses without one
        function generateExplanation(verse) {
            // This is a simplified explanation generator
            // In a real app, you'd want to use a proper Tafsir API
            const explanations = [
                `This beautiful verse from Surah ${verse.surahName} reminds us of Allah's infinite wisdom and mercy. It encourages believers to reflect on the deeper meanings of faith and how we can apply these teachings in our daily lives.`,
                `The wisdom in this verse from Surah ${verse.surahName} speaks to the human heart about the importance of maintaining a strong connection with Allah. It guides us toward righteousness and reminds us of our purpose in this world.`,
                `This verse beautifully illustrates one of the fundamental principles of Islam. It serves as both guidance and comfort, showing us how Allah's teachings provide solutions and peace for the challenges we face in life.`
            ];
            
            return explanations[Math.floor(Math.random() * explanations.length)];
        }
        
        // Load a new random verse
        function loadNewVerse() {
            const randomVerseNumber = Math.floor(Math.random() * 6236) + 1;
            loadVerse(randomVerseNumber);
        }
        
        // Share functionality
        function shareVerse() {
            if (!currentVerse) return;
            
            const shareText = `"${currentVerse.translation}"\n\n- Quran ${currentVerse.surahNumber}:${currentVerse.ayahNumber}\n\nDaily Quran Verse App`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Daily Quran Verse',
                    text: shareText,
                });
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('Verse copied to clipboard!');
                });
            }
        }
        
        // Bookmark functionality
        function toggleBookmark() {
            if (!currentVerse) return;
            
            const verseId = `${currentVerse.surahNumber}-${currentVerse.ayahNumber}`;
            const existingIndex = bookmarks.findIndex(b => b.id === verseId);
            
            if (existingIndex > -1) {
                bookmarks.splice(existingIndex, 1);
                alert('Bookmark removed!');
            } else {
                bookmarks.push({
                    id: verseId,
                    ...currentVerse,
                    bookmarkedAt: new Date().toISOString()
                });
                alert('Verse bookmarked!');
            }
            
            localStorage.setItem('quranBookmarks', JSON.stringify(bookmarks));
        }
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            loadVerse();
            
            // Update date every hour
            setInterval(updateDate, 3600000);
        });
    </script>
</body>
</html>
